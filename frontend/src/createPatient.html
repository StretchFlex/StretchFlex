<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Patient</title>
	<link rel="stylesheet" href="css/createPatientStyles.css">
    <link rel="stylesheet" href="css/universalStyles.css">
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

</head>
<body>
    <h2>Patient Information</h2>
    <p>Fill out Patient Information below</p>

    <!-- need to put everything inside this form to make it secure and use the form action to submit to the backend. Then we can use the continue modal to link to the next page. -->
<!-- <form method="POST" action="submitPatientData">
    </form> -->

<div class="flex-container-cP">
<!-- Input Fields -->
<label for="fNameInput">First Name</label>
    <input type="text" class="questionTextboxShort" id="fNameInput" placeholder="Type here..." maxlength="20">
<label for="lNameInput">Last Name</label>
    <input type="text" class="questionTextboxShort" id="lNameInput" placeholder="Type here..." maxlength="20">

<form>
    <label for="dobInput">Date of Birth</label>
    <div class="date-picker-wrapper">
        <input type="text" class="questionTextboxShort" id="dobInput" placeholder="MM/DD/YYYY" maxlength="10">
        <button type="button" class="calendar-icon" id="calendarButton">
            <img src="assets/images/calendar-icon.png" alt="Calendar">
        </button>
    </div>
</form>

<label for="emailInput">Email Address</label>
    <input type="text" class="questionTextboxShort" id="emailInput" placeholder="Type here..." maxlength="100">

<label for="sexInput">Birth Sex</label>
    <form class="questionSelectOne">
        <label><input type="radio" name="sex" value="male"> Male</label>
        <label><input type="radio" name="sex" value="female"> Female</label>
        <label><input type="radio" name="sex" value="RND"> Rather Not Disclose</label>
    </form>


    <label for="heightInput">Height (m)</label>
    <input type="number" class="questionTextboxFloat questionTextboxShort" id="heightInput" placeholder="Type here..." step="0.01">

    <label for="massInput">Mass (kg)</label>
    <input type="number" class="questionTextboxFloat questionTextboxShort" id="massInput" placeholder="Type here..." step="0.01">

    <button class="createButton" id="createPatientBtn">Create New Patient ID</button>

</div>

<!-- Continue Modal -->
 <div class="modal fade" id="continueModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content continue-modal">
            <div class="modal-header">
                <h5 class="modal-title">Success!</h5>
            </div>
            <div class="modal-body"> Patient created successfully! </div>   
            <div class="modal-footer">
                <button type="button" class="continueButton" data-bs-dismiss="modal">Continue to Patient Medical Data</button>
            </div>
        </div>
    </div>
 </div>  
 
    <!-- Error Modal -->
    <div class="modal fade" id="errorModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content error-modal">
                <div class="modal-header">
                    <h5 class="modal-title">Error</h5>
                </div>
                <div class="modal-body"> Please fill out all fields to create a new patient. </div>
                <div class="modal-footer">
                    <button type="button" class="errorButton" data-bs-dismiss="modal">Try Again</button>
                </div>
            </div>
        </div>
    </div>  


<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="js/bootstrap/bootstrap.bundle.min.js"></script>
<script src="js/createPatientScript.js"></script>
</body>
</html>
